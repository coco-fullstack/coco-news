name: Daily News WeChat

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  daily-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run cloud_news.py
        env:
          PUSHPLUS_TOKENS: ${{ secrets.PUSHPLUS_TOKENS }}
        run: python scripts/cloud_news.py
