name: Urgent News Check

on:
  schedule:
    # 每2小时检查一次紧急新闻（北京时间 8:00-22:00）
    - cron: "0 0,2,4,6,8,10,12,14 * * *"
  workflow_dispatch:

jobs:
  urgent-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check urgent news
        env:
          PUSHPLUS_TOKENS: ${{ secrets.PUSHPLUS_TOKENS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python scripts/cloud_news.py urgent
