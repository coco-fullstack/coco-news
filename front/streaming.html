<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineVerse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #000000;
  --bg-card: #0a0a0a;
  --bg-elevated: #111111;
  --bg-hover: #1a1a1a;
  --text-primary: #f5f5f7;
  --text-secondary: rgba(255,255,255,0.50);
  --text-tertiary: rgba(255,255,255,0.25);
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --white-10: rgba(255,255,255,0.10);
  --white-05: rgba(255,255,255,0.05);
  --radius: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --nav-h: 56px;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
::-webkit-scrollbar { width: 4px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

/* === NAV === */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h); z-index: 1000;
  display: flex; align-items: center; padding: 0 48px;
  transition: background 0.5s, backdrop-filter 0.5s;
}
nav.scrolled {
  background: rgba(0,0,0,0.80);
  backdrop-filter: blur(40px) saturate(1.8);
  border-bottom: 1px solid var(--border);
}
.nav-brand {
  font-family: var(--font-display); font-size: 22px; font-weight: 600;
  letter-spacing: 0.5px; color: var(--text-primary);
  flex-shrink: 0; cursor: pointer;
}
.nav-tabs {
  display: flex; gap: 0; margin-left: 40px;
}
.nav-tab {
  padding: 8px 20px; font-size: 13px; font-weight: 500;
  color: var(--text-secondary); cursor: pointer; transition: color 0.3s;
  white-space: nowrap; border: none; background: none;
  font-family: var(--font-body); letter-spacing: 0.3px;
  position: relative;
}
.nav-tab:hover { color: var(--text-primary); }
.nav-tab.active { color: var(--text-primary); }
.nav-tab.active::after {
  content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; background: white; border-radius: 50%;
}
.nav-spacer { flex: 1; }
.nav-search-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: none; background: none;
  color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.3s;
}
.nav-search-btn:hover { color: var(--text-primary); }

/* === SEARCH === */
.search-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.95); backdrop-filter: blur(60px);
  display: flex; flex-direction: column; padding: 0 48px;
  opacity: 0; visibility: hidden; transition: opacity 0.4s, visibility 0.4s;
}
.search-overlay.open { opacity: 1; visibility: visible; }
.search-bar-wrap {
  display: flex; align-items: center; gap: 16px;
  height: 80px; border-bottom: 1px solid var(--border);
}
.search-input {
  flex: 1; background: none; border: none; color: var(--text-primary);
  font-size: 24px; font-family: var(--font-body); font-weight: 300; outline: none;
  letter-spacing: -0.3px;
}
.search-input::placeholder { color: var(--text-tertiary); }
.search-close {
  background: none; border: 1px solid var(--border); color: var(--text-tertiary);
  font-size: 11px; padding: 4px 10px; border-radius: 4px; cursor: pointer;
  font-family: var(--font-body); transition: all 0.2s; letter-spacing: 0.5px;
}
.search-close:hover { border-color: var(--border-hover); color: var(--text-secondary); }
.search-results { flex: 1; overflow-y: auto; padding: 32px 0; }
.search-results-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 24px;
}
.search-empty { text-align: center; padding: 100px 0; color: var(--text-tertiary); font-size: 14px; font-weight: 300; }

/* === HERO === */
.hero { position: relative; height: 90vh; min-height: 600px; overflow: hidden; }
.hero-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.2s ease; }
.hero-slide.active { opacity: 1; }
.hero-backdrop {
  width: 100%; height: 100%; object-fit: cover;
  transform: scale(1.03); transition: transform 12s ease-out;
  filter: brightness(0.7);
}
.hero-slide.active .hero-backdrop { transform: scale(1); }
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.95) 85%, #000 100%);
}
.hero-side-fade {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(0,0,0,0.6) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.6) 100%);
}
.hero-content { position: absolute; bottom: 14%; left: 48px; max-width: 540px; z-index: 2; }
.hero-badge {
  display: inline-block; padding: 3px 10px; border-radius: 3px;
  font-size: 10px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 16px;
  background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.08);
}
.hero-title {
  font-family: var(--font-display); font-size: clamp(36px, 5vw, 60px);
  font-weight: 500; letter-spacing: -0.5px; line-height: 1.05; margin-bottom: 16px;
  color: white;
}
.hero-meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;
  font-weight: 300;
}
.hero-meta .dot { width: 3px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 50%; }
.hero-rating { color: rgba(255,255,255,0.8); font-weight: 500; }
.hero-desc {
  font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.45); font-weight: 300;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  line-clamp: 3; overflow: hidden; margin-bottom: 28px;
  letter-spacing: 0.2px;
}
.hero-actions { display: flex; gap: 10px; }
.btn-detail {
  padding: 10px 28px; border-radius: 30px; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: var(--font-body); transition: all 0.3s;
  border: none; display: flex; align-items: center; gap: 8px;
  background: white; color: black; letter-spacing: 0.3px;
}
.btn-detail:hover { background: rgba(255,255,255,0.9); transform: scale(1.03); }
.btn-secondary {
  padding: 10px 28px; border-radius: 30px; font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: var(--font-body); transition: all 0.3s;
  border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.08); color: white; letter-spacing: 0.3px;
}
.btn-secondary:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
.hero-dots {
  position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 5;
}
.hero-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.15); cursor: pointer;
  transition: all 0.4s; border: none;
}
.hero-dot.active { background: white; width: 20px; border-radius: 3px; }

/* === MAIN === */
main { position: relative; z-index: 2; margin-top: -40px; padding-bottom: 80px; }
.section {
  margin-bottom: 52px; opacity: 0; transform: translateY(24px);
  transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1);
}
.section.visible { opacity: 1; transform: none; }
.section-header {
  display: flex; align-items: baseline; gap: 0;
  padding: 0 48px; margin-bottom: 20px;
}
.section-title {
  font-family: var(--font-display); font-size: 22px; font-weight: 500;
  letter-spacing: -0.2px; color: var(--text-primary);
}
.section-count {
  font-size: 12px; color: var(--text-tertiary); font-weight: 400;
  margin-left: 12px;
}

.carousel {
  display: flex; gap: 16px; padding: 0 48px;
  overflow-x: auto; scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch; scrollbar-width: none; cursor: grab;
}
.carousel::-webkit-scrollbar { display: none; }
.carousel:active { cursor: grabbing; }

.card {
  flex-shrink: 0; width: 180px; scroll-snap-align: start;
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); cursor: pointer;
}
.card:hover { transform: translateY(-6px) scale(1.02); }
.card-poster {
  position: relative; width: 100%; aspect-ratio: 2/3;
  border-radius: var(--radius); overflow: hidden;
  background: var(--bg-card);
}
.card-poster img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.6s cubic-bezier(0.16,1,0.3,1), filter 0.6s;
  filter: brightness(0.85);
}
.card:hover .card-poster img { transform: scale(1.05); filter: brightness(1); }
.card-poster .card-rating {
  position: absolute; top: 8px; right: 8px;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.8);
}
.card-poster .card-type-badge {
  position: absolute; top: 8px; left: 8px; padding: 2px 7px; border-radius: 3px;
  font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
}
.badge-movie { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }
.badge-tv { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }
.badge-anime { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }
.card-info { padding: 10px 2px 0; }
.card-title {
  font-size: 13px; font-weight: 500; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; color: var(--text-primary);
}
.card-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; font-weight: 300; }
.card-wide { width: 320px; }
.card-wide .card-poster { aspect-ratio: 16/9; border-radius: var(--radius-lg); }

/* === MODAL === */
.modal-overlay {
  position: fixed; inset: 0; z-index: 3000;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 60px 40px 40px; overflow-y: auto;
  opacity: 0; visibility: hidden; transition: opacity 0.4s, visibility 0.4s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal {
  width: min(860px, 100%); background: var(--bg-elevated);
  border-radius: var(--radius-xl); overflow: hidden;
  transform: translateY(24px) scale(0.97);
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  border: 1px solid var(--border);
}
.modal-overlay.open .modal { transform: none; }
.modal-backdrop-wrap { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; }
.modal-backdrop { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
.modal-backdrop-fade {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 20%, var(--bg-elevated) 100%);
}
.modal-close {
  position: absolute; top: 16px; right: 16px; width: 32px; height: 32px;
  border-radius: 50%; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s;
}
.modal-close:hover { background: rgba(255,255,255,0.1); color: white; }
.modal-body { padding: 0 40px 40px; margin-top: -36px; position: relative; }
.modal-title {
  font-family: var(--font-display); font-size: 36px; font-weight: 500;
  letter-spacing: -0.3px; margin-bottom: 12px;
}
.modal-meta {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  margin-bottom: 16px; font-size: 13px; color: var(--text-secondary); font-weight: 300;
}
.modal-meta .rating { color: rgba(255,255,255,0.8); font-weight: 500; }
.modal-meta .sep { color: var(--text-tertiary); }
.modal-genres { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.genre-tag {
  padding: 4px 14px; border-radius: 20px;
  border: 1px solid var(--border);
  font-size: 11px; color: var(--text-secondary); font-weight: 400;
  letter-spacing: 0.3px;
}
.modal-overview {
  font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.50);
  font-weight: 300; margin-bottom: 32px; letter-spacing: 0.2px;
}
.modal-section-title {
  font-family: var(--font-display); font-size: 18px; font-weight: 500;
  margin-bottom: 16px; color: var(--text-primary);
}
.modal-cast { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
.modal-cast::-webkit-scrollbar { display: none; }
.cast-card { flex-shrink: 0; text-align: center; width: 72px; }
.cast-avatar {
  width: 56px; height: 56px; border-radius: 50%; object-fit: cover;
  background: var(--bg-card); margin-bottom: 8px;
  filter: grayscale(0.3);
}
.cast-name { font-size: 10px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cast-role { font-size: 9px; color: var(--text-tertiary); font-weight: 300; margin-top: 2px; }

/* === LOADING === */
.skeleton {
  background: linear-gradient(90deg, var(--bg-card) 25%, rgba(255,255,255,0.03) 50%, var(--bg-card) 75%);
  background-size: 200% 100%; animation: shimmer 2s infinite; border-radius: var(--radius);
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.spinner {
  width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.06);
  border-top-color: rgba(255,255,255,0.5); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.8s; gap: 24px;
}
.loading-screen.hidden { opacity: 0; pointer-events: none; }
.loading-logo {
  font-family: var(--font-display); font-size: 32px; font-weight: 500;
  color: var(--text-primary); letter-spacing: 1px;
}

footer {
  text-align: center; padding: 48px; color: var(--text-tertiary);
  font-size: 12px; font-weight: 300; letter-spacing: 0.5px;
}

@media (max-width: 768px) {
  nav { padding: 0 24px; }
  .nav-tabs { margin-left: 16px; }
  .nav-tab { padding: 6px 14px; font-size: 12px; }
  .hero-content { left: 24px; max-width: 85%; }
  .hero-title { font-size: 32px; }
  .section-header, .carousel { padding-left: 24px; padding-right: 24px; }
  .card { width: 145px; }
  .card-wide { width: 270px; }
  .modal-overlay { padding: 24px; }
  .modal-body { padding: 0 24px 24px; }
  .modal-title { font-size: 28px; }
}
@media (max-width: 480px) {
  .nav-tabs { display: none; }
  .card { width: 130px; }
  .card-wide { width: 250px; }
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">CineVerse</div>
  <div class="spinner"></div>
</div>

<!-- Nav -->
<nav id="nav">
  <div class="nav-brand" id="navBrand">CineVerse</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-type="all">全部</button>
    <button class="nav-tab" data-type="movie">电影</button>
    <button class="nav-tab" data-type="tv">电视剧</button>
    <button class="nav-tab" data-type="anime">动漫</button>
  </div>
  <div class="nav-spacer"></div>
  <button class="nav-search-btn" id="searchBtn" title="Search (Ctrl+K)">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
</nav>

<!-- Search -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-bar-wrap">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-tertiary);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="搜索电影、电视剧、动漫...">
    <button class="search-close" id="searchClose">ESC</button>
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- Hero -->
<section class="hero" id="hero"><div class="hero-dots" id="heroDots"></div></section>

<!-- Main -->
<main id="mainContent"></main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-backdrop-wrap">
      <img class="modal-backdrop" id="modalBackdrop" src="" alt="">
      <div class="modal-backdrop-fade"></div>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<footer>CineVerse &mdash; 数据来源于公开资源</footer>

<script>
(function() {
  'use strict';

  var API = '';
  var currentType = 'all';
  var heroSlides = [];
  var heroIndex = 0;
  var heroTimer = null;
  var searchTimer = null;

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.textContent; }

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function(k) {
      var v = attrs[k];
      if (k === 'className') node.className = v;
      else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
      else node.setAttribute(k, v);
    });
    if (typeof children === 'string') node.textContent = children;
    else if (Array.isArray(children)) children.forEach(function(c) { if (c) node.appendChild(c); });
    else if (children instanceof Node) node.appendChild(children);
    return node;
  }

  function noPosterSVG() {
    return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300"><rect fill="#0a0a0a" width="200" height="300"/><text fill="#333" x="100" y="150" text-anchor="middle" font-size="14">暂无图片</text></svg>');
  }

  async function api(path) {
    var res = await fetch(API + path);
    if (!res.ok) throw new Error('API Error: ' + res.status);
    return res.json();
  }

  var SECTION_CFG = {
    trending_movie: { label: '热门电影',   api: '/api/trending/movie' },
    upcoming:       { label: '即将上映',   api: '/api/movies/upcoming', wide: true },
    cn_movie:       { label: '华语电影',   api: '/api/regional?type=movie&country=CN' },
    top_movie:      { label: '高分电影',   api: '/api/movies/top_rated' },
    now_playing:    { label: '正在热映',   api: '/api/movies/now_playing' },
    trending_tv:    { label: '热门剧集',   api: '/api/trending/tv' },
    cn_tv:          { label: '国产剧',     api: '/api/regional?type=tv&country=CN' },
    jp_tv:          { label: '日剧',       api: '/api/regional?type=tv&country=JP' },
    top_tv:         { label: '高分剧集',   api: '/api/tv/top_rated' },
    airing:         { label: '今日播出',   api: '/api/tv/airing' },
    anime_pop:      { label: '热门动漫',   api: '/api/anime/popular' },
    anime_top:      { label: '高分动漫',   api: '/api/anime/top_rated' },
    anime_airing:   { label: '连载中',     api: '/api/anime/airing' },
    anime_upcoming: { label: '即将播出',   api: '/api/anime/upcoming' },
    anime_movie:    { label: '动漫电影',   api: '/api/anime/movies' },
  };

  async function init() {
    try {
      await loadContent();
      setupNav();
      setupSearch();
      setupScrollObserver();
      setupModal();
    } finally {
      setTimeout(function() { document.getElementById('loadingScreen').classList.add('hidden'); }, 400);
    }
  }

  async function loadContent() {
    var main = document.getElementById('mainContent');
    main.textContent = '';
    loadHero();
    var secs = getActiveSections();
    secs.forEach(function(id) {
      var cfg = SECTION_CFG[id];
      var secEl = createSectionEl(id, cfg);
      main.appendChild(secEl);
      loadSection(cfg.api, secEl, cfg.wide);
    });
  }

  function getActiveSections() {
    if (currentType === 'movie') return ['trending_movie', 'upcoming', 'cn_movie', 'top_movie', 'now_playing'];
    if (currentType === 'tv') return ['trending_tv', 'cn_tv', 'jp_tv', 'top_tv', 'airing'];
    if (currentType === 'anime') return ['anime_pop', 'anime_top', 'anime_airing', 'anime_upcoming', 'anime_movie'];
    return ['trending_movie', 'upcoming', 'trending_tv', 'anime_pop', 'cn_movie', 'cn_tv', 'jp_tv', 'top_movie', 'anime_top'];
  }

  async function loadHero() {
    try {
      var endpoint = '/api/trending/all';
      if (currentType === 'movie') endpoint = '/api/trending/movie';
      else if (currentType === 'tv') endpoint = '/api/trending/tv';
      else if (currentType === 'anime') endpoint = '/api/anime/popular';
      heroSlides = (await api(endpoint)).slice(0, 6);
      renderHero();
    } catch(e) { console.error('Hero error:', e); }
  }

  function renderHero() {
    var hero = document.getElementById('hero');
    var dots = document.getElementById('heroDots');
    hero.querySelectorAll('.hero-slide').forEach(function(s) { s.remove(); });
    dots.textContent = '';

    heroSlides.forEach(function(item, i) {
      var mtype = item.media_type || 'movie';
      var title = esc(item.title || item.title_en || '');
      var slide = el('div', { className: 'hero-slide' + (i === 0 ? ' active' : '') });

      var imgUrl = item.poster || '';
      if (imgUrl) slide.appendChild(el('img', { className: 'hero-backdrop', src: imgUrl, alt: title, loading: i === 0 ? 'eager' : 'lazy' }));
      slide.appendChild(el('div', { className: 'hero-overlay' }));
      slide.appendChild(el('div', { className: 'hero-side-fade' }));

      var content = el('div', { className: 'hero-content' });
      var badgeLbl = { movie: '电影', tv: '剧集', anime: '动漫' };
      content.appendChild(el('span', { className: 'hero-badge' }, badgeLbl[mtype] || 'FILM'));
      content.appendChild(el('h1', { className: 'hero-title' }, title));

      var meta = el('div', { className: 'hero-meta' });
      if (item.rating > 0) { meta.appendChild(el('span', { className: 'hero-rating' }, item.rating + '')); meta.appendChild(el('span', { className: 'dot' })); }
      if (item.year) meta.appendChild(el('span', null, item.year));
      if (item.genres && item.genres.length) { meta.appendChild(el('span', { className: 'dot' })); meta.appendChild(el('span', null, item.genres.slice(0, 3).join(' / '))); }
      content.appendChild(meta);

      if (item.overview) content.appendChild(el('p', { className: 'hero-desc' }, esc(item.overview)));

      var actions = el('div', { className: 'hero-actions' });
      actions.appendChild(el('button', {
        className: 'btn-detail',
        onClick: (function(it) { return function() { openDetail(it); }; })(item)
      }, '了解更多'));
      content.appendChild(actions);
      slide.appendChild(content);
      hero.insertBefore(slide, dots);

      dots.appendChild(el('button', {
        className: 'hero-dot' + (i === 0 ? ' active' : ''),
        onClick: (function(idx) { return function() { goHero(idx); }; })(i)
      }));
    });

    clearInterval(heroTimer);
    if (heroSlides.length > 1) heroTimer = setInterval(function() { goHero((heroIndex + 1) % heroSlides.length); }, 8000);
  }

  function goHero(i) {
    heroIndex = i;
    document.querySelectorAll('.hero-slide').forEach(function(s, idx) { s.classList.toggle('active', idx === i); });
    document.querySelectorAll('.hero-dot').forEach(function(d, idx) { d.classList.toggle('active', idx === i); });
  }

  function createSectionEl(id, cfg) {
    var sec = el('section', { className: 'section', id: 'section-' + id });
    var header = el('div', { className: 'section-header' });
    header.appendChild(el('h2', { className: 'section-title' }, cfg.label));
    sec.appendChild(header);
    var carousel = el('div', { className: 'carousel' });
    for (var k = 0; k < 8; k++) {
      var ph = el('div', { className: 'card' });
      ph.appendChild(el('div', { className: 'card-poster skeleton', style: 'aspect-ratio:2/3' }));
      carousel.appendChild(ph);
    }
    sec.appendChild(carousel);
    return sec;
  }

  async function loadSection(endpoint, secEl, wide) {
    try {
      var data = await api(endpoint);
      var carousel = secEl.querySelector('.carousel');
      carousel.textContent = '';
      data.forEach(function(item) { carousel.appendChild(createCard(item, wide)); });
      setupDragScroll(carousel);
    } catch(e) { console.error('Section error:', e); }
  }

  function createCard(item, wide) {
    var mtype = item.media_type || 'movie';
    var title = esc(item.title || item.title_en || '');
    var poster = item.poster || noPosterSVG();

    var card = el('div', {
      className: 'card' + (wide ? ' card-wide' : ''),
      onClick: (function(it) { return function() { openDetail(it); }; })(item)
    });

    var posterDiv = el('div', { className: 'card-poster' });
    posterDiv.appendChild(el('img', { src: poster, alt: title, loading: 'lazy' }));
    if (item.rating > 0) posterDiv.appendChild(el('span', { className: 'card-rating' }, item.rating + ''));

    var badgeClass = { movie: 'badge-movie', tv: 'badge-tv', anime: 'badge-anime' };
    var badgeLabel = { movie: '电影', tv: '剧集', anime: '动漫' };
    posterDiv.appendChild(el('span', { className: 'card-type-badge ' + (badgeClass[mtype] || 'badge-movie') }, badgeLabel[mtype] || '电影'));

    card.appendChild(posterDiv);
    var info = el('div', { className: 'card-info' });
    info.appendChild(el('div', { className: 'card-title' }, title));
    info.appendChild(el('div', { className: 'card-sub' }, item.year || ''));
    card.appendChild(info);
    return card;
  }

  function openDetail(item) {
    var overlay = document.getElementById('modalOverlay');
    var body = document.getElementById('modalBody');
    var backdrop = document.getElementById('modalBackdrop');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    body.textContent = '';
    body.appendChild(el('div', { className: 'spinner' }));
    backdrop.src = item.poster || '';

    var mtype = item.media_type || 'movie';
    var detailUrl = '/api/detail/' + mtype + '/' + item.id;

    api(detailUrl).then(function(d) {
      if (d.backdrop) backdrop.src = d.backdrop;
      else if (d.poster) backdrop.src = d.poster;
      body.textContent = '';

      var title = esc(d.title || d.title_en || item.title || '');
      body.appendChild(el('h2', { className: 'modal-title' }, title));

      var meta = el('div', { className: 'modal-meta' });
      if (d.rating > 0) { meta.appendChild(el('span', { className: 'rating' }, d.rating + '')); meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); }
      if (d.year) meta.appendChild(el('span', null, d.year));
      if (d.runtime) { meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); meta.appendChild(el('span', null, d.runtime)); }
      if (d.status) { meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); meta.appendChild(el('span', null, d.status)); }
      if (d.language) { meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); meta.appendChild(el('span', null, d.language)); }
      if (d.episodes) { meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); meta.appendChild(el('span', null, d.episodes + ' 集')); }
      body.appendChild(meta);

      if (d.genres && d.genres.length) {
        var gd = el('div', { className: 'modal-genres' });
        d.genres.forEach(function(g) { gd.appendChild(el('span', { className: 'genre-tag' }, g)); });
        body.appendChild(gd);
      }

      body.appendChild(el('p', { className: 'modal-overview' }, esc(d.overview) || '暂无简介'));

      if (d.cast && d.cast.length) {
        body.appendChild(el('h3', { className: 'modal-section-title' }, '演员'));
        var cd = el('div', { className: 'modal-cast' });
        d.cast.forEach(function(c) {
          var cc = el('div', { className: 'cast-card' });
          cc.appendChild(el('img', { className: 'cast-avatar', src: c.avatar || noPosterSVG(), alt: esc(c.name), loading: 'lazy' }));
          cc.appendChild(el('div', { className: 'cast-name' }, esc(c.name)));
          cc.appendChild(el('div', { className: 'cast-role' }, esc(c.character || '')));
          cd.appendChild(cc);
        });
        body.appendChild(cd);
      }
    }).catch(function(e) {
      body.textContent = '';
      body.appendChild(el('h2', { className: 'modal-title' }, esc(item.title || '')));
      if (item.overview) body.appendChild(el('p', { className: 'modal-overview' }, esc(item.overview)));
      else body.appendChild(el('p', { style: 'color:var(--text-secondary);padding:20px 0' }, '加载失败'));
      console.error(e);
    });
  }

  function setupModal() {
    document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === e.currentTarget) closeModal(); });
    document.getElementById('modalClose').addEventListener('click', closeModal);
  }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; }

  function setupNav() {
    window.addEventListener('scroll', function() {
      document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50);
    }, { passive: true });
    document.getElementById('navBrand').addEventListener('click', function() { window.scrollTo({ top: 0 }); });
    document.querySelectorAll('.nav-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        currentType = tab.dataset.type;
        loadContent();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  function setupSearch() {
    var overlay = document.getElementById('searchOverlay');
    var input = document.getElementById('searchInput');
    var results = document.getElementById('searchResults');
    results.textContent = '';
    results.appendChild(el('div', { className: 'search-empty' }, '搜索电影、电视剧、动漫'));
    document.getElementById('searchBtn').addEventListener('click', function() { overlay.classList.add('open'); input.focus(); });
    document.getElementById('searchClose').addEventListener('click', function() { overlay.classList.remove('open'); input.value = ''; });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && overlay.classList.contains('open')) { overlay.classList.remove('open'); input.value = ''; }
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); overlay.classList.add('open'); input.focus(); }
    });
    input.addEventListener('input', function() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(function() { doSearch(input.value.trim()); }, 400);
    });
  }

  async function doSearch(q) {
    var c = document.getElementById('searchResults');
    if (!q) { c.textContent = ''; c.appendChild(el('div', { className: 'search-empty' }, '搜索电影、电视剧、动漫')); return; }
    c.textContent = ''; c.appendChild(el('div', { className: 'spinner' }));
    try {
      var data = await api('/api/search?q=' + encodeURIComponent(q));
      c.textContent = '';
      if (!data.length) { c.appendChild(el('div', { className: 'search-empty' }, '没有找到 "' + esc(q) + '" 的结果')); return; }
      var grid = el('div', { className: 'search-results-grid' });
      data.forEach(function(item) { grid.appendChild(createCard(item)); });
      c.appendChild(grid);
    } catch(e) { c.textContent = ''; c.appendChild(el('div', { className: 'search-empty' }, '搜索出错')); }
  }

  function setupDragScroll(el) {
    var isDown = false, sx = 0, sl = 0;
    el.addEventListener('mousedown', function(e) { isDown = true; sx = e.pageX - el.offsetLeft; sl = el.scrollLeft; });
    el.addEventListener('mouseleave', function() { isDown = false; });
    el.addEventListener('mouseup', function() { isDown = false; });
    el.addEventListener('mousemove', function(e) { if (!isDown) return; e.preventDefault(); el.scrollLeft = sl - (e.pageX - el.offsetLeft - sx) * 1.5; });
  }

  function setupScrollObserver() {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    new MutationObserver(function() {
      document.querySelectorAll('.section:not(.visible)').forEach(function(s) { obs.observe(s); });
    }).observe(document.getElementById('mainContent'), { childList: true });
  }

  init();
})();
</script>
</body>
</html>
