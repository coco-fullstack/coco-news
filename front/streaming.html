<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoCo - 影视聚合</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f5f5;
  --bg-white: #ffffff;
  --bg-card: #ffffff;
  --bg-hover: #f0f0f0;
  --bg-dark: #1a1a2e;
  --text-primary: #1a1a1a;
  --text-secondary: #666666;
  --text-tertiary: #999999;
  --text-light: #ffffff;
  --accent: #ff4757;
  --accent-hover: #ff6b81;
  --accent-bg: rgba(255,71,87,0.08);
  --border: #e8e8e8;
  --border-light: #f0f0f0;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 8px;
  --radius-lg: 12px;
  --radius-xl: 20px;
  --font: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --nav-h: 56px;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-primary);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 4px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

/* === NAV === */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h); z-index: 1000;
  display: flex; align-items: center; padding: 0 32px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px) saturate(1.5);
  border-bottom: 1px solid var(--border-light);
  box-shadow: var(--shadow-sm);
}
.nav-brand {
  font-size: 20px; font-weight: 700; color: var(--accent);
  flex-shrink: 0; cursor: pointer; letter-spacing: -0.5px;
}
.nav-tabs {
  display: flex; gap: 4px; margin-left: 32px;
  background: var(--bg); border-radius: 8px; padding: 3px;
}
.nav-tab {
  padding: 6px 18px; border-radius: 6px; font-size: 13px; font-weight: 500;
  color: var(--text-secondary); cursor: pointer; transition: all 0.25s;
  white-space: nowrap; border: none; background: none; font-family: var(--font);
}
.nav-tab:hover { color: var(--text-primary); }
.nav-tab.active { background: var(--bg-white); color: var(--accent); box-shadow: var(--shadow-sm); }
.nav-spacer { flex: 1; }
.nav-search-btn {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg-white);
  color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s;
}
.nav-search-btn:hover { border-color: var(--accent); color: var(--accent); }

/* === SEARCH === */
.search-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(255,255,255,0.96); backdrop-filter: blur(30px);
  display: flex; flex-direction: column; padding: 0 32px;
  opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s;
}
.search-overlay.open { opacity: 1; visibility: visible; }
.search-bar-wrap {
  display: flex; align-items: center; gap: 14px;
  height: 72px; border-bottom: 1px solid var(--border);
}
.search-bar-wrap svg { color: var(--text-tertiary); flex-shrink: 0; }
.search-input {
  flex: 1; background: none; border: none; color: var(--text-primary);
  font-size: 18px; font-family: var(--font); font-weight: 400; outline: none;
}
.search-input::placeholder { color: var(--text-tertiary); }
.search-close {
  background: var(--bg); border: 1px solid var(--border); color: var(--text-tertiary);
  font-size: 11px; padding: 4px 10px; border-radius: 4px; cursor: pointer;
  font-family: var(--font); transition: all 0.2s;
}
.search-close:hover { background: var(--border); color: var(--text-secondary); }
.search-results { flex: 1; overflow-y: auto; padding: 24px 0; }
.search-results-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px;
}
.search-empty { text-align: center; padding: 80px 0; color: var(--text-tertiary); font-size: 14px; }

/* === HERO === */
.hero { position: relative; height: 440px; overflow: hidden; margin-top: var(--nav-h); border-radius: 0 0 var(--radius-xl) var(--radius-xl); }
.hero-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease; }
.hero-slide.active { opacity: 1; }
.hero-backdrop {
  width: 100%; height: 100%; object-fit: cover;
  transform: scale(1.02); transition: transform 10s ease-out;
}
.hero-slide.active .hero-backdrop { transform: scale(1); }
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 60%, rgba(0,0,0,0.8) 100%);
}
.hero-side-fade {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(0,0,0,0.4) 0%, transparent 50%);
}
.hero-content {
  position: absolute; bottom: 40px; left: 40px; max-width: 480px; z-index: 2; color: white;
}
.hero-badge {
  display: inline-block; padding: 3px 10px; border-radius: 4px;
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  background: var(--accent); color: white; margin-bottom: 12px;
}
.hero-title {
  font-size: clamp(24px, 4vw, 36px); font-weight: 700;
  line-height: 1.2; margin-bottom: 10px; color: white;
}
.hero-meta {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: rgba(255,255,255,0.75); margin-bottom: 10px;
}
.hero-meta .dot { width: 3px; height: 3px; background: rgba(255,255,255,0.4); border-radius: 50%; }
.hero-rating { color: #ffd700; font-weight: 600; }
.hero-desc {
  font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.65);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  line-clamp: 2; overflow: hidden; margin-bottom: 18px;
}
.hero-actions { display: flex; gap: 10px; }
.btn-detail {
  padding: 8px 24px; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--font); transition: all 0.25s;
  border: none; background: var(--accent); color: white;
}
.btn-detail:hover { background: var(--accent-hover); transform: translateY(-1px); }
.hero-dots {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 5;
}
.hero-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.3); cursor: pointer;
  transition: all 0.3s; border: none;
}
.hero-dot.active { background: white; width: 18px; border-radius: 3px; }

/* === MAIN === */
main { position: relative; z-index: 2; padding: 24px 0 60px; }
.section {
  margin-bottom: 32px; opacity: 0; transform: translateY(20px);
  transition: opacity 0.6s, transform 0.6s;
}
.section.visible { opacity: 1; transform: none; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; margin-bottom: 14px;
}
.section-title {
  font-size: 18px; font-weight: 700; color: var(--text-primary);
  position: relative; padding-left: 12px;
}
.section-title::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 18px; background: var(--accent); border-radius: 2px;
}

.carousel {
  display: flex; gap: 14px; padding: 0 32px;
  overflow-x: auto; scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch; scrollbar-width: none; cursor: grab;
}
.carousel::-webkit-scrollbar { display: none; }
.carousel:active { cursor: grabbing; }

.card {
  flex-shrink: 0; width: 150px; scroll-snap-align: start;
  transition: transform 0.3s; cursor: pointer;
}
.card:hover { transform: translateY(-4px); }
.card-poster {
  position: relative; width: 100%; aspect-ratio: 2/3;
  border-radius: var(--radius); overflow: hidden;
  background: var(--border); box-shadow: var(--shadow-card);
}
.card-poster img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
.card:hover .card-poster img { transform: scale(1.05); }
.card-poster .card-rating {
  position: absolute; top: 6px; right: 6px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; color: #ffd700;
}
.card-poster .card-type-badge {
  position: absolute; top: 6px; left: 6px; padding: 2px 6px; border-radius: 3px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
}
.badge-movie { background: var(--accent); color: white; }
.badge-tv { background: #3742fa; color: white; }
.badge-anime { background: #ff6348; color: white; }
.card-info { padding: 8px 2px 0; }
.card-title {
  font-size: 13px; font-weight: 500; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; color: var(--text-primary);
}
.card-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
.card-wide { width: 280px; }
.card-wide .card-poster { aspect-ratio: 16/9; border-radius: var(--radius-lg); }

/* === MODAL === */
.modal-overlay {
  position: fixed; inset: 0; z-index: 3000;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 60px 20px 20px; overflow-y: auto;
  opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal {
  width: min(800px, 100%); background: var(--bg-white);
  border-radius: var(--radius-xl); overflow: hidden;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: var(--shadow-lg);
}
.modal-overlay.open .modal { transform: none; }
.modal-backdrop-wrap { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; }
.modal-backdrop { width: 100%; height: 100%; object-fit: cover; }
.modal-backdrop-fade {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 40%, var(--bg-white) 100%);
}
.modal-close {
  position: absolute; top: 12px; right: 12px; width: 32px; height: 32px;
  border-radius: 50%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
  border: none; color: white; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.modal-close:hover { background: rgba(0,0,0,0.6); }
.modal-body { padding: 0 28px 28px; margin-top: -32px; position: relative; }
.modal-title {
  font-size: 24px; font-weight: 700; margin-bottom: 10px; color: var(--text-primary);
}
.modal-meta {
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  margin-bottom: 12px; font-size: 13px; color: var(--text-secondary);
}
.modal-meta .rating { color: var(--accent); font-weight: 600; }
.modal-meta .sep { color: var(--text-tertiary); }
.modal-genres { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.genre-tag {
  padding: 3px 12px; border-radius: 14px;
  background: var(--bg); font-size: 12px; color: var(--text-secondary); font-weight: 500;
}
.modal-overview {
  font-size: 14px; line-height: 1.8; color: var(--text-secondary); margin-bottom: 24px;
}
.modal-section-title {
  font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text-primary);
}
.modal-cast { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
.modal-cast::-webkit-scrollbar { display: none; }
.cast-card { flex-shrink: 0; text-align: center; width: 68px; }
.cast-avatar {
  width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
  background: var(--bg); margin-bottom: 6px;
}
.cast-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
.cast-role { font-size: 10px; color: var(--text-tertiary); margin-top: 1px; }

/* === PLAYER === */
.player-overlay {
  position: fixed; inset: 0; z-index: 4000;
  background: #000; display: flex; flex-direction: column;
  opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s;
}
.player-overlay.open { opacity: 1; visibility: visible; }
.player-top {
  display: flex; align-items: center; padding: 12px 20px;
  background: rgba(0,0,0,0.9); z-index: 2;
}
.player-title { flex: 1; font-size: 14px; font-weight: 500; color: white; }
.player-close-btn {
  background: none; border: none; color: rgba(255,255,255,0.6);
  font-size: 24px; cursor: pointer; padding: 4px 8px; transition: color 0.2s;
}
.player-close-btn:hover { color: white; }
.player-video-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: #000; position: relative;
}
.player-video-wrap video { width: 100%; height: 100%; max-height: 100vh; background: #000; }
.player-bottom {
  background: #111; border-top: 1px solid #222;
  max-height: 200px; overflow-y: auto;
}
.ep-list { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px 20px; }
.ep-btn {
  padding: 6px 16px; border-radius: 6px; font-size: 12px;
  font-family: var(--font); cursor: pointer; transition: all 0.2s;
  border: 1px solid #333; background: #1a1a1a; color: #aaa; white-space: nowrap;
}
.ep-btn:hover { background: #2a2a2a; color: #fff; }
.ep-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.player-loading {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px; color: #aaa; font-size: 13px;
}
.source-info { padding: 4px 20px 0; font-size: 11px; color: #666; }
.play-btn-modal {
  padding: 10px 28px; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--font); transition: all 0.25s;
  border: none; display: flex; align-items: center; gap: 8px;
  background: var(--accent); color: white;
}
.play-btn-modal:hover { background: var(--accent-hover); transform: translateY(-1px); }

/* === LOADING === */
.skeleton {
  background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius);
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.spinner {
  width: 24px; height: 24px; border: 2px solid #e0e0e0;
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg-white);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.6s; gap: 16px;
}
.loading-screen.hidden { opacity: 0; pointer-events: none; }
.loading-logo { font-size: 28px; font-weight: 700; color: var(--accent); }

footer {
  text-align: center; padding: 32px; color: var(--text-tertiary);
  font-size: 12px; background: var(--bg-white);
  border-top: 1px solid var(--border-light);
}

@media (max-width: 768px) {
  nav { padding: 0 16px; }
  .nav-tabs { margin-left: 12px; }
  .nav-tab { padding: 5px 12px; font-size: 12px; }
  .hero { height: 320px; }
  .hero-content { left: 20px; bottom: 30px; max-width: 80%; }
  .hero-title { font-size: 22px; }
  .section-header, .carousel { padding-left: 16px; padding-right: 16px; }
  .card { width: 120px; }
  .card-wide { width: 240px; }
  .modal-overlay { padding: 20px 12px; }
  .modal-body { padding: 0 20px 20px; }
  .modal-title { font-size: 20px; }
}
@media (max-width: 480px) {
  .nav-tabs { display: none; }
  .card { width: 110px; }
  .card-wide { width: 220px; }
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">CoCo</div>
  <div class="spinner"></div>
</div>

<!-- Nav -->
<nav id="nav">
  <div class="nav-brand" id="navBrand">CoCo</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-type="all">全部</button>
    <button class="nav-tab" data-type="movie">电影</button>
    <button class="nav-tab" data-type="tv">电视剧</button>
    <button class="nav-tab" data-type="anime">动漫</button>
  </div>
  <div class="nav-spacer"></div>
  <button class="nav-search-btn" id="searchBtn" title="搜索 (Ctrl+K)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
</nav>

<!-- Search -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-bar-wrap">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="搜索电影、电视剧、动漫...">
    <button class="search-close" id="searchClose">ESC</button>
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- Hero -->
<section class="hero" id="hero"><div class="hero-dots" id="heroDots"></div></section>

<!-- Main -->
<main id="mainContent"></main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-backdrop-wrap">
      <img class="modal-backdrop" id="modalBackdrop" src="" alt="">
      <div class="modal-backdrop-fade"></div>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Player -->
<div class="player-overlay" id="playerOverlay">
  <div class="player-top">
    <div class="player-title" id="playerTitle"></div>
    <button class="player-close-btn" id="playerClose">&times;</button>
  </div>
  <div class="player-video-wrap" id="playerVideoWrap">
    <video id="playerVideo" controls playsinline autoplay style="width:100%;height:100%;background:#000"></video>
  </div>
  <div class="player-bottom">
    <div class="source-info" id="sourceInfo"></div>
    <div class="ep-list" id="epList"></div>
  </div>
</div>

<footer>CoCo &mdash; 影视数据来源于公开资源</footer>

<script>
(function() {
  'use strict';

  var API = '';
  var currentType = 'all';
  var heroSlides = [];
  var heroIndex = 0;
  var heroTimer = null;
  var searchTimer = null;

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.textContent; }

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function(k) {
      var v = attrs[k];
      if (k === 'className') node.className = v;
      else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
      else node.setAttribute(k, v);
    });
    if (typeof children === 'string') node.textContent = children;
    else if (Array.isArray(children)) children.forEach(function(c) { if (c) node.appendChild(c); });
    else if (children instanceof Node) node.appendChild(children);
    return node;
  }

  function noPosterSVG() {
    return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300"><rect fill="#f0f0f0" width="200" height="300"/><text fill="#ccc" x="100" y="150" text-anchor="middle" font-size="14">暂无图片</text></svg>');
  }

  async function api(path) {
    var res = await fetch(API + path);
    if (!res.ok) throw new Error('API Error: ' + res.status);
    return res.json();
  }

  var SECTION_CFG = {
    trending_movie: { label: '热门电影',   api: '/api/trending/movie' },
    upcoming:       { label: '即将上映',   api: '/api/movies/upcoming', wide: true },
    cn_movie:       { label: '华语电影',   api: '/api/regional?type=movie&country=CN' },
    top_movie:      { label: '高分电影',   api: '/api/movies/top_rated' },
    now_playing:    { label: '正在热映',   api: '/api/movies/now_playing' },
    trending_tv:    { label: '热门剧集',   api: '/api/trending/tv' },
    cn_tv:          { label: '国产剧',     api: '/api/regional?type=tv&country=CN' },
    jp_tv:          { label: '日剧',       api: '/api/regional?type=tv&country=JP' },
    top_tv:         { label: '高分剧集',   api: '/api/tv/top_rated' },
    airing:         { label: '今日播出',   api: '/api/tv/airing' },
    anime_pop:      { label: '热门动漫',   api: '/api/anime/popular' },
    anime_top:      { label: '高分动漫',   api: '/api/anime/top_rated' },
    anime_airing:   { label: '连载中',     api: '/api/anime/airing' },
    anime_upcoming: { label: '即将播出',   api: '/api/anime/upcoming' },
    anime_movie:    { label: '动漫电影',   api: '/api/anime/movies' },
  };

  async function init() {
    try {
      await loadContent();
      setupNav();
      setupSearch();
      setupScrollObserver();
      setupModal();
    } finally {
      setTimeout(function() { document.getElementById('loadingScreen').classList.add('hidden'); }, 400);
    }
  }

  async function loadContent() {
    var main = document.getElementById('mainContent');
    main.textContent = '';
    loadHero();
    var secs = getActiveSections();
    secs.forEach(function(id) {
      var cfg = SECTION_CFG[id];
      var secEl = createSectionEl(id, cfg);
      main.appendChild(secEl);
      loadSection(cfg.api, secEl, cfg.wide);
    });
  }

  function getActiveSections() {
    if (currentType === 'movie') return ['trending_movie', 'upcoming', 'cn_movie', 'top_movie', 'now_playing'];
    if (currentType === 'tv') return ['trending_tv', 'cn_tv', 'jp_tv', 'top_tv', 'airing'];
    if (currentType === 'anime') return ['anime_pop', 'anime_top', 'anime_airing', 'anime_upcoming', 'anime_movie'];
    return ['trending_movie', 'upcoming', 'trending_tv', 'anime_pop', 'cn_movie', 'cn_tv', 'jp_tv', 'top_movie', 'anime_top'];
  }

  async function loadHero() {
    try {
      var endpoint = '/api/trending/all';
      if (currentType === 'movie') endpoint = '/api/trending/movie';
      else if (currentType === 'tv') endpoint = '/api/trending/tv';
      else if (currentType === 'anime') endpoint = '/api/anime/popular';
      heroSlides = (await api(endpoint)).slice(0, 6);
      renderHero();
    } catch(e) { console.error('Hero error:', e); }
  }

  function renderHero() {
    var hero = document.getElementById('hero');
    var dots = document.getElementById('heroDots');
    hero.querySelectorAll('.hero-slide').forEach(function(s) { s.remove(); });
    dots.textContent = '';

    heroSlides.forEach(function(item, i) {
      var mtype = item.media_type || 'movie';
      var title = esc(item.title || item.title_en || '');
      var slide = el('div', { className: 'hero-slide' + (i === 0 ? ' active' : '') });

      var imgUrl = item.poster || '';
      if (imgUrl) slide.appendChild(el('img', { className: 'hero-backdrop', src: imgUrl, alt: title, loading: i === 0 ? 'eager' : 'lazy' }));
      slide.appendChild(el('div', { className: 'hero-overlay' }));
      slide.appendChild(el('div', { className: 'hero-side-fade' }));

      var content = el('div', { className: 'hero-content' });
      var badgeLbl = { movie: '电影', tv: '剧集', anime: '动漫' };
      content.appendChild(el('span', { className: 'hero-badge' }, badgeLbl[mtype] || '电影'));
      content.appendChild(el('h1', { className: 'hero-title' }, title));

      var meta = el('div', { className: 'hero-meta' });
      if (item.rating > 0) { meta.appendChild(el('span', { className: 'hero-rating' }, item.rating + '')); meta.appendChild(el('span', { className: 'dot' })); }
      if (item.year) meta.appendChild(el('span', null, item.year));
      if (item.genres && item.genres.length) { meta.appendChild(el('span', { className: 'dot' })); meta.appendChild(el('span', null, item.genres.slice(0, 3).join(' / '))); }
      content.appendChild(meta);

      if (item.overview) content.appendChild(el('p', { className: 'hero-desc' }, esc(item.overview)));

      var actions = el('div', { className: 'hero-actions' });
      actions.appendChild(el('button', {
        className: 'btn-detail',
        onClick: (function(it) { return function() { openDetail(it); }; })(item)
      }, '了解更多'));
      content.appendChild(actions);
      slide.appendChild(content);
      hero.insertBefore(slide, dots);

      dots.appendChild(el('button', {
        className: 'hero-dot' + (i === 0 ? ' active' : ''),
        onClick: (function(idx) { return function() { goHero(idx); }; })(i)
      }));
    });

    clearInterval(heroTimer);
    if (heroSlides.length > 1) heroTimer = setInterval(function() { goHero((heroIndex + 1) % heroSlides.length); }, 8000);
  }

  function goHero(i) {
    heroIndex = i;
    document.querySelectorAll('.hero-slide').forEach(function(s, idx) { s.classList.toggle('active', idx === i); });
    document.querySelectorAll('.hero-dot').forEach(function(d, idx) { d.classList.toggle('active', idx === i); });
  }

  function createSectionEl(id, cfg) {
    var sec = el('section', { className: 'section', id: 'section-' + id });
    var header = el('div', { className: 'section-header' });
    header.appendChild(el('h2', { className: 'section-title' }, cfg.label));
    sec.appendChild(header);
    var carousel = el('div', { className: 'carousel' });
    for (var k = 0; k < 8; k++) {
      var ph = el('div', { className: 'card' });
      ph.appendChild(el('div', { className: 'card-poster skeleton', style: 'aspect-ratio:2/3' }));
      carousel.appendChild(ph);
    }
    sec.appendChild(carousel);
    return sec;
  }

  async function loadSection(endpoint, secEl, wide) {
    try {
      var data = await api(endpoint);
      var carousel = secEl.querySelector('.carousel');
      carousel.textContent = '';
      data.forEach(function(item) { carousel.appendChild(createCard(item, wide)); });
      setupDragScroll(carousel);
    } catch(e) { console.error('Section error:', e); }
  }

  function createCard(item, wide) {
    var mtype = item.media_type || 'movie';
    var title = esc(item.title || item.title_en || '');
    var poster = item.poster || noPosterSVG();

    var card = el('div', {
      className: 'card' + (wide ? ' card-wide' : ''),
      onClick: (function(it) { return function() { openDetail(it); }; })(item)
    });

    var posterDiv = el('div', { className: 'card-poster' });
    posterDiv.appendChild(el('img', { src: poster, alt: title, loading: 'lazy' }));
    if (item.rating > 0) posterDiv.appendChild(el('span', { className: 'card-rating' }, item.rating + ''));

    var badgeClass = { movie: 'badge-movie', tv: 'badge-tv', anime: 'badge-anime' };
    var badgeLabel = { movie: '电影', tv: '剧集', anime: '动漫' };
    posterDiv.appendChild(el('span', { className: 'card-type-badge ' + (badgeClass[mtype] || 'badge-movie') }, badgeLabel[mtype] || '电影'));

    card.appendChild(posterDiv);
    var info = el('div', { className: 'card-info' });
    info.appendChild(el('div', { className: 'card-title' }, title));
    info.appendChild(el('div', { className: 'card-sub' }, item.year || ''));
    card.appendChild(info);
    return card;
  }

  function openDetail(item) {
    var overlay = document.getElementById('modalOverlay');
    var body = document.getElementById('modalBody');
    var backdrop = document.getElementById('modalBackdrop');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    body.textContent = '';
    body.appendChild(el('div', { className: 'spinner' }));
    backdrop.src = item.poster || '';

    var mtype = item.media_type || 'movie';
    var detailUrl = '/api/detail/' + mtype + '/' + item.id;

    api(detailUrl).then(function(d) {
      if (d.backdrop) backdrop.src = d.backdrop;
      else if (d.poster) backdrop.src = d.poster;
      body.textContent = '';

      var title = esc(d.title || d.title_en || item.title || '');
      var titleCn = esc(d.title_cn || '');
      body.appendChild(el('h2', { className: 'modal-title' }, titleCn || title));

      var meta = el('div', { className: 'modal-meta' });
      if (d.rating > 0) { meta.appendChild(el('span', { className: 'rating' }, d.rating + ' 分')); meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); }
      if (d.year) meta.appendChild(el('span', null, d.year));
      if (d.runtime) { meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); meta.appendChild(el('span', null, d.runtime)); }
      if (d.status) { meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); meta.appendChild(el('span', null, d.status)); }
      if (d.language) { meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); meta.appendChild(el('span', null, d.language)); }
      if (d.episodes) { meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); meta.appendChild(el('span', null, d.episodes + ' 集')); }
      body.appendChild(meta);

      if (d.genres && d.genres.length) {
        var gd = el('div', { className: 'modal-genres' });
        d.genres.forEach(function(g) { gd.appendChild(el('span', { className: 'genre-tag' }, g)); });
        body.appendChild(gd);
      }

      // Play button
      var playActions = el('div', { style: 'display:flex;gap:10px;margin-bottom:20px' });
      playActions.appendChild(el('button', {
        className: 'play-btn-modal',
        onClick: (function(t) { return function() { searchAndPlay(t); }; })(titleCn || title)
      }, [
        el('svg', { width: '14', height: '14', viewBox: '0 0 24 24', fill: 'currentColor' }),
        document.createTextNode('立即播放')
      ]));
      var playSvg = playActions.querySelector('svg');
      var polyNode = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      polyNode.setAttribute('points', '5,3 19,12 5,21');
      playSvg.appendChild(polyNode);
      body.appendChild(playActions);

      body.appendChild(el('p', { className: 'modal-overview' }, esc(d.overview) || '暂无简介'));

      if (d.cast && d.cast.length) {
        body.appendChild(el('h3', { className: 'modal-section-title' }, '演员'));
        var cd = el('div', { className: 'modal-cast' });
        d.cast.forEach(function(c) {
          var cc = el('div', { className: 'cast-card' });
          cc.appendChild(el('img', { className: 'cast-avatar', src: c.avatar || noPosterSVG(), alt: esc(c.name), loading: 'lazy' }));
          cc.appendChild(el('div', { className: 'cast-name' }, esc(c.name)));
          cc.appendChild(el('div', { className: 'cast-role' }, esc(c.character || '')));
          cd.appendChild(cc);
        });
        body.appendChild(cd);
      }
    }).catch(function(e) {
      body.textContent = '';
      body.appendChild(el('h2', { className: 'modal-title' }, esc(item.title || '')));
      if (item.overview) body.appendChild(el('p', { className: 'modal-overview' }, esc(item.overview)));
      else body.appendChild(el('p', { style: 'color:var(--text-secondary);padding:20px 0' }, '加载失败'));
      console.error(e);
    });
  }

  function setupModal() {
    document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === e.currentTarget) closeModal(); });
    document.getElementById('modalClose').addEventListener('click', closeModal);
  }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; }

  function setupNav() {
    document.getElementById('navBrand').addEventListener('click', function() { window.scrollTo({ top: 0 }); });
    document.querySelectorAll('.nav-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        currentType = tab.dataset.type;
        loadContent();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  function setupSearch() {
    var overlay = document.getElementById('searchOverlay');
    var input = document.getElementById('searchInput');
    var results = document.getElementById('searchResults');
    results.textContent = '';
    results.appendChild(el('div', { className: 'search-empty' }, '搜索电影、电视剧、动漫'));
    document.getElementById('searchBtn').addEventListener('click', function() { overlay.classList.add('open'); input.focus(); });
    document.getElementById('searchClose').addEventListener('click', function() { overlay.classList.remove('open'); input.value = ''; });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && overlay.classList.contains('open')) { overlay.classList.remove('open'); input.value = ''; }
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); overlay.classList.add('open'); input.focus(); }
    });
    input.addEventListener('input', function() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(function() { doSearch(input.value.trim()); }, 400);
    });
  }

  async function doSearch(q) {
    var c = document.getElementById('searchResults');
    if (!q) { c.textContent = ''; c.appendChild(el('div', { className: 'search-empty' }, '搜索电影、电视剧、动漫')); return; }
    c.textContent = ''; c.appendChild(el('div', { className: 'spinner' }));
    try {
      var data = await api('/api/search?q=' + encodeURIComponent(q));
      c.textContent = '';
      if (!data.length) { c.appendChild(el('div', { className: 'search-empty' }, '没有找到 "' + esc(q) + '" 的结果')); return; }
      var grid = el('div', { className: 'search-results-grid' });
      data.forEach(function(item) { grid.appendChild(createCard(item)); });
      c.appendChild(grid);
    } catch(e) { c.textContent = ''; c.appendChild(el('div', { className: 'search-empty' }, '搜索出错')); }
  }

  function setupDragScroll(el) {
    var isDown = false, sx = 0, sl = 0;
    el.addEventListener('mousedown', function(e) { isDown = true; sx = e.pageX - el.offsetLeft; sl = el.scrollLeft; });
    el.addEventListener('mouseleave', function() { isDown = false; });
    el.addEventListener('mouseup', function() { isDown = false; });
    el.addEventListener('mousemove', function(e) { if (!isDown) return; e.preventDefault(); el.scrollLeft = sl - (e.pageX - el.offsetLeft - sx) * 1.5; });
  }

  function setupScrollObserver() {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    new MutationObserver(function() {
      document.querySelectorAll('.section:not(.visible)').forEach(function(s) { obs.observe(s); });
    }).observe(document.getElementById('mainContent'), { childList: true });
  }

  // ===== PLAYER =====
  var hlsInstance = null;
  var currentEpisodes = [];
  var currentResults = [];
  var currentSourceIdx = 0;

  function searchAndPlay(title) {
    var overlay = document.getElementById('playerOverlay');
    var videoWrap = document.getElementById('playerVideoWrap');
    var epList = document.getElementById('epList');
    var srcInfo = document.getElementById('sourceInfo');
    document.getElementById('playerTitle').textContent = title;
    overlay.classList.add('open');
    epList.textContent = '';
    srcInfo.textContent = '搜索中...';

    var loadDiv = el('div', { className: 'player-loading', id: 'playerLoading' });
    loadDiv.appendChild(el('div', { className: 'spinner' }));
    loadDiv.appendChild(el('span', null, '正在搜索资源...'));
    videoWrap.appendChild(loadDiv);

    api('/api/video/search?q=' + encodeURIComponent(title)).then(function(results) {
      var ld = document.getElementById('playerLoading');
      if (ld) ld.remove();

      if (!results || !results.length) {
        srcInfo.textContent = '未找到播放资源 (搜索: ' + title + ')';
        return;
      }

      currentResults = results;
      currentSourceIdx = 0;
      var video = results[0];
      currentEpisodes = video.episodes || [];
      srcInfo.textContent = '来源: ' + (video.source_name || '未知') + ' | ' + (video.remarks || '') + (results.length > 1 ? ' (共' + results.length + '个源)' : '');

      if (!currentEpisodes.length) {
        srcInfo.textContent = '该资源暂无可播放内容';
        return;
      }

      currentEpisodes.forEach(function(ep, idx) {
        epList.appendChild(el('button', {
          className: 'ep-btn' + (idx === 0 ? ' active' : ''),
          onClick: (function(e, i) { return function() { playEpisode(e.url, i); }; })(ep, idx)
        }, ep.name));
      });

      playEpisode(currentEpisodes[0].url, 0);
    }).catch(function(e) {
      var ld = document.getElementById('playerLoading');
      if (ld) ld.remove();
      srcInfo.textContent = '搜索失败: ' + e.message;
    });
  }

  function playEpisode(url, idx) {
    var videoEl = document.getElementById('playerVideo');
    var epBtns = document.querySelectorAll('.ep-btn');
    epBtns.forEach(function(b, i) { b.classList.toggle('active', i === idx); });
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    if (!url) return;

    if (url.includes('.m3u8') && Hls.isSupported()) {
      hlsInstance = new Hls();
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(videoEl);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
        videoEl.play().catch(function() {});
      });
      hlsInstance.on(Hls.Events.ERROR, function(evt, data) {
        if (data.fatal) {
          console.error('HLS error, trying next source');
          tryNextSource();
        }
      });
    } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari native HLS
      videoEl.src = url;
      videoEl.play().catch(function() {});
    } else {
      videoEl.src = url;
      videoEl.play().catch(function() {});
    }
  }

  function tryNextSource() {
    currentSourceIdx++;
    if (currentSourceIdx < currentResults.length) {
      var next = currentResults[currentSourceIdx];
      currentEpisodes = next.episodes || [];
      var srcInfo = document.getElementById('sourceInfo');
      srcInfo.textContent = '切换来源: ' + (next.source_name || '未知') + ' | ' + (next.remarks || '');
      var epList = document.getElementById('epList');
      epList.textContent = '';
      currentEpisodes.forEach(function(ep, idx) {
        epList.appendChild(el('button', {
          className: 'ep-btn' + (idx === 0 ? ' active' : ''),
          onClick: (function(e, i) { return function() { playEpisode(e.url, i); }; })(ep, idx)
        }, ep.name));
      });
      if (currentEpisodes.length) playEpisode(currentEpisodes[0].url, 0);
    } else {
      document.getElementById('sourceInfo').textContent = '所有资源均不可用';
    }
  }

  function closePlayer() {
    var overlay = document.getElementById('playerOverlay');
    var videoEl = document.getElementById('playerVideo');
    overlay.classList.remove('open');
    videoEl.pause();
    videoEl.removeAttribute('src');
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    var ld = document.getElementById('playerLoading');
    if (ld) ld.remove();
  }

  document.getElementById('playerClose').addEventListener('click', closePlayer);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && document.getElementById('playerOverlay').classList.contains('open')) closePlayer();
  });

  init();
})();
</script>
</body>
</html>
