<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineVerse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #1c2128;
  --text-primary: #e6edf3;
  --text-secondary: rgba(255,255,255,0.55);
  --text-tertiary: rgba(255,255,255,0.3);
  --accent: #58a6ff;
  --accent-glow: rgba(88,166,255,0.25);
  --accent-green: #3fb950;
  --accent-purple: #bc8cff;
  --accent-warm: #ff7b72;
  --border: rgba(255,255,255,0.08);
  --gradient-hero: linear-gradient(180deg, transparent 0%, rgba(13,17,23,0.4) 40%, rgba(13,17,23,0.85) 70%, var(--bg-primary) 100%);
  --gradient-side: linear-gradient(90deg, var(--bg-primary) 0%, transparent 30%, transparent 70%, var(--bg-primary) 100%);
  --radius-md: 12px;
  --radius-xl: 24px;
  --shadow-card: 0 4px 24px rgba(0,0,0,0.4);
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Outfit', sans-serif;
  --nav-height: 64px;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-height); z-index: 1000;
  display: flex; align-items: center; padding: 0 40px;
  transition: background 0.4s, backdrop-filter 0.4s;
}
nav.scrolled {
  background: rgba(13,17,23,0.85);
  backdrop-filter: blur(30px) saturate(1.4);
  border-bottom: 1px solid var(--border);
}
.nav-brand {
  font-family: var(--font-display); font-size: 26px; letter-spacing: 4px;
  background: linear-gradient(135deg, var(--accent), var(--accent-purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  flex-shrink: 0; cursor: pointer;
}
.nav-tabs {
  display: flex; gap: 2px; margin-left: 36px;
  background: rgba(255,255,255,0.04); border-radius: 10px; padding: 3px;
}
.nav-tab {
  padding: 7px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
  color: var(--text-secondary); cursor: pointer; transition: all 0.25s;
  white-space: nowrap; border: none; background: none; font-family: var(--font-body);
}
.nav-tab:hover { color: var(--text-primary); }
.nav-tab.active { background: rgba(255,255,255,0.1); color: var(--text-primary); }
.nav-spacer { flex: 1; }
.nav-search-btn {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.04);
  color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s; font-size: 16px;
}
.nav-search-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

/* SEARCH */
.search-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(13,17,23,0.92); backdrop-filter: blur(40px);
  display: flex; flex-direction: column; padding: 0 40px;
  opacity: 0; visibility: hidden; transition: opacity 0.35s, visibility 0.35s;
}
.search-overlay.open { opacity: 1; visibility: visible; }
.search-bar-wrap {
  display: flex; align-items: center; gap: 16px;
  height: 80px; border-bottom: 1px solid var(--border);
}
.search-input {
  flex: 1; background: none; border: none; color: var(--text-primary);
  font-size: 20px; font-family: var(--font-body); font-weight: 300; outline: none;
}
.search-input::placeholder { color: var(--text-tertiary); }
.search-close {
  background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text-secondary);
  font-size: 12px; padding: 4px 10px; border-radius: 6px; cursor: pointer;
  font-family: monospace; transition: all 0.2s;
}
.search-close:hover { background: rgba(255,255,255,0.1); }
.search-results { flex: 1; overflow-y: auto; padding: 24px 0; }
.search-results-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px;
}
.search-empty { text-align: center; padding: 80px 0; color: var(--text-tertiary); font-size: 15px; }

/* HERO */
.hero { position: relative; height: 85vh; min-height: 560px; overflow: hidden; }
.hero-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1s ease; }
.hero-slide.active { opacity: 1; }
.hero-backdrop {
  width: 100%; height: 100%; object-fit: cover;
  transform: scale(1.05); transition: transform 8s ease-out;
}
.hero-slide.active .hero-backdrop { transform: scale(1); }
.hero-overlay { position: absolute; inset: 0; background: var(--gradient-hero); }
.hero-side-fade { position: absolute; inset: 0; background: var(--gradient-side); }
.hero-content { position: absolute; bottom: 12%; left: 40px; max-width: 580px; z-index: 2; }
.hero-badge {
  display: inline-block; padding: 4px 12px; border-radius: 4px;
  font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 14px; border: 1px solid;
}
.hero-badge-movie { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.4); color: #a5b4fc; }
.hero-badge-tv { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.4); color: #6ee7b7; }
.hero-badge-anime { background: rgba(244,63,94,0.2); border-color: rgba(244,63,94,0.4); color: #fda4af; }
.hero-title {
  font-family: var(--font-display); font-size: clamp(40px, 6vw, 72px);
  letter-spacing: 2px; line-height: 1; margin-bottom: 14px;
  text-shadow: 0 2px 40px rgba(0,0,0,0.5);
}
.hero-meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 14px; color: var(--text-secondary); margin-bottom: 14px;
}
.hero-meta .dot { width: 3px; height: 3px; background: var(--text-tertiary); border-radius: 50%; }
.hero-rating { color: #fbbf24; font-weight: 600; }
.hero-desc {
  font-size: 15px; line-height: 1.6; color: rgba(255,255,255,0.65); font-weight: 300;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  line-clamp: 3;
  overflow: hidden; margin-bottom: 24px;
}
.hero-actions { display: flex; gap: 12px; }
.btn-detail {
  padding: 10px 24px; border-radius: var(--radius-md); font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: var(--font-body); transition: all 0.25s;
  border: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.08); color: white; backdrop-filter: blur(10px);
}
.btn-detail:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.2); }
.hero-dots {
  position: absolute; bottom: 4%; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; z-index: 5;
}
.hero-dot {
  width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2);
  cursor: pointer; transition: all 0.3s; border: none;
}
.hero-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }

/* MAIN */
main { position: relative; z-index: 2; margin-top: -60px; padding-bottom: 80px; }
.section {
  margin-bottom: 48px; opacity: 0; transform: translateY(30px);
  transition: opacity 0.7s, transform 0.7s;
}
.section.visible { opacity: 1; transform: none; }
.section-header {
  display: flex; align-items: center; gap: 12px;
  padding: 0 40px; margin-bottom: 18px;
}
.section-icon {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0; font-weight: 700;
}
.si-fire { background: rgba(255,123,114,0.15); color: #ff7b72; }
.si-cal  { background: rgba(88,166,255,0.15); color: #58a6ff; }
.si-star { background: rgba(251,191,36,0.15); color: #fbbf24; }
.si-play { background: rgba(63,185,80,0.15); color: #3fb950; }
.si-cn   { background: rgba(255,123,114,0.15); color: #ff7b72; }
.si-jp   { background: rgba(188,140,255,0.15); color: #bc8cff; }
.si-anime{ background: rgba(244,63,94,0.15); color: #f43f5e; }
.section-title { font-family: var(--font-display); font-size: 26px; letter-spacing: 2px; }

.carousel {
  display: flex; gap: 14px; padding: 0 40px;
  overflow-x: auto; scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch; scrollbar-width: none; cursor: grab;
}
.carousel::-webkit-scrollbar { display: none; }
.carousel:active { cursor: grabbing; }

.card {
  flex-shrink: 0; width: 200px; scroll-snap-align: start;
  transition: transform 0.35s; cursor: pointer;
}
.card:hover { transform: translateY(-8px); }
.card-poster {
  position: relative; width: 100%; aspect-ratio: 2/3;
  border-radius: var(--radius-md); overflow: hidden;
  background: var(--bg-secondary); box-shadow: var(--shadow-card);
}
.card-poster img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.card:hover .card-poster img { transform: scale(1.06); }
.card-poster .card-rating {
  position: absolute; top: 8px; right: 8px;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
  padding: 2px 7px; border-radius: 6px; font-size: 11px; font-weight: 600; color: #fbbf24;
}
.card-poster .card-type-badge {
  position: absolute; top: 8px; left: 8px; padding: 2px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
}
.badge-movie { background: rgba(99,102,241,0.85); }
.badge-tv { background: rgba(16,185,129,0.85); }
.badge-anime { background: rgba(244,63,94,0.85); }
.card-info { padding: 10px 2px 0; }
.card-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-sub { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
.card-wide { width: 340px; }
.card-wide .card-poster { aspect-ratio: 16/9; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; z-index: 3000;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 40px; overflow-y: auto;
  opacity: 0; visibility: hidden; transition: opacity 0.35s, visibility 0.35s;
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal {
  width: min(880px, 100%); background: var(--bg-secondary);
  border-radius: var(--radius-xl); overflow: hidden;
  transform: translateY(30px) scale(0.96);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  border: 1px solid var(--border);
}
.modal-overlay.open .modal { transform: none; }
.modal-backdrop-wrap { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; }
.modal-backdrop { width: 100%; height: 100%; object-fit: cover; }
.modal-backdrop-fade {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 30%, var(--bg-secondary) 100%);
}
.modal-close {
  position: absolute; top: 16px; right: 16px; width: 36px; height: 36px;
  border-radius: 8px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1); color: white; font-size: 20px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.modal-close:hover { background: rgba(255,255,255,0.15); }
.modal-body { padding: 0 36px 36px; margin-top: -40px; position: relative; }
.modal-title { font-family: var(--font-display); font-size: 42px; letter-spacing: 2px; margin-bottom: 12px; }
.modal-meta {
  display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  margin-bottom: 16px; font-size: 14px; color: var(--text-secondary);
}
.modal-meta .rating { color: #fbbf24; font-weight: 600; }
.modal-meta .sep { color: var(--text-tertiary); }
.modal-genres { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.genre-tag {
  padding: 4px 12px; border-radius: 20px;
  border: 1px solid var(--border);
  font-size: 12px; color: var(--text-secondary); font-weight: 500;
}
.modal-overview { font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.65); font-weight: 300; margin-bottom: 28px; }
.modal-section-title { font-family: var(--font-display); font-size: 22px; letter-spacing: 1.5px; margin-bottom: 14px; }
.modal-cast { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
.modal-cast::-webkit-scrollbar { display: none; }
.cast-card { flex-shrink: 0; text-align: center; width: 80px; }
.cast-avatar {
  width: 64px; height: 64px; border-radius: 50%; object-fit: cover;
  background: var(--bg-tertiary); margin-bottom: 6px;
}
.cast-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cast-role { font-size: 10px; color: var(--text-tertiary); }

.skeleton {
  background: linear-gradient(90deg, var(--bg-secondary) 25%, rgba(255,255,255,0.06) 50%, var(--bg-secondary) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-md);
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.spinner {
  width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.08);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg-primary);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.6s; gap: 20px;
}
.loading-screen.hidden { opacity: 0; pointer-events: none; }
.loading-logo {
  font-family: var(--font-display); font-size: 48px; letter-spacing: 6px;
  background: linear-gradient(135deg, var(--accent), var(--accent-purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

footer {
  text-align: center; padding: 40px; color: var(--text-tertiary);
  font-size: 13px; border-top: 1px solid var(--border);
}

@media (max-width: 768px) {
  nav { padding: 0 20px; }
  .nav-tabs { margin-left: 12px; }
  .nav-tab { padding: 6px 12px; font-size: 12px; }
  .hero-content { left: 20px; max-width: 85%; }
  .hero-title { font-size: 36px; }
  .section-header, .carousel { padding-left: 20px; padding-right: 20px; }
  .card { width: 150px; }
  .card-wide { width: 280px; }
  .modal-overlay { padding: 20px; }
  .modal-body { padding: 0 24px 24px; }
  .modal-title { font-size: 30px; }
}
@media (max-width: 480px) {
  .nav-tabs { display: none; }
  .card { width: 130px; }
  .card-wide { width: 260px; }
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">CINEVERSE</div>
  <div class="spinner"></div>
  <p style="color:var(--text-tertiary);font-size:13px">Loading content...</p>
</div>

<!-- Nav -->
<nav id="nav">
  <div class="nav-brand" id="navBrand">CINEVERSE</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-type="all">All</button>
    <button class="nav-tab" data-type="movie">Movies</button>
    <button class="nav-tab" data-type="tv">TV Shows</button>
    <button class="nav-tab" data-type="anime">Anime</button>
  </div>
  <div class="nav-spacer"></div>
  <button class="nav-search-btn" id="searchBtn" title="Search (Ctrl+K)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
</nav>

<!-- Search -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-bar-wrap">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-secondary);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Search movies, TV shows, anime...">
    <button class="search-close" id="searchClose">ESC</button>
  </div>
  <div class="search-results" id="searchResults"></div>
</div>

<!-- Hero -->
<section class="hero" id="hero"><div class="hero-dots" id="heroDots"></div></section>

<!-- Main -->
<main id="mainContent"></main>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-backdrop-wrap">
      <img class="modal-backdrop" id="modalBackdrop" src="" alt="">
      <div class="modal-backdrop-fade"></div>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<footer>CineVerse &mdash; No API key required &middot; Data from public sources</footer>

<script>
(function() {
  'use strict';

  var API = '';  // Same origin
  var currentType = 'all';
  var heroSlides = [];
  var heroIndex = 0;
  var heroTimer = null;
  var searchTimer = null;

  function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.textContent; }

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function(k) {
      var v = attrs[k];
      if (k === 'className') node.className = v;
      else if (k.startsWith('on')) node.addEventListener(k.slice(2).toLowerCase(), v);
      else node.setAttribute(k, v);
    });
    if (typeof children === 'string') node.textContent = children;
    else if (Array.isArray(children)) children.forEach(function(c) { if (c) node.appendChild(c); });
    else if (children instanceof Node) node.appendChild(children);
    return node;
  }

  function noPosterSVG() {
    return 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300"><rect fill="#161b22" width="200" height="300"/><text fill="#555" x="100" y="150" text-anchor="middle" font-size="14">No Image</text></svg>');
  }

  async function api(path) {
    var res = await fetch(API + path);
    if (!res.ok) throw new Error('API Error: ' + res.status);
    return res.json();
  }

  // ===== SECTIONS CONFIG =====
  var SECTION_CFG = {
    trending_movie: { icon: 'si-fire', sym: '\u2736', label: 'TRENDING MOVIES', api: '/api/trending/movie' },
    upcoming:       { icon: 'si-cal',  sym: '\u25C8', label: 'COMING SOON',     api: '/api/movies/upcoming', wide: true },
    cn_movie:       { icon: 'si-cn',   sym: 'CN',     label: 'CHINESE MOVIES',  api: '/api/regional?type=movie&country=CN' },
    top_movie:      { icon: 'si-star', sym: '\u2605', label: 'TOP RATED MOVIES', api: '/api/movies/top_rated' },
    now_playing:    { icon: 'si-play', sym: '\u25B6', label: 'NOW PLAYING',      api: '/api/movies/now_playing' },
    trending_tv:    { icon: 'si-fire', sym: '\u2736', label: 'TRENDING TV',      api: '/api/trending/tv' },
    cn_tv:          { icon: 'si-cn',   sym: 'CN',     label: 'CHINESE TV',       api: '/api/regional?type=tv&country=CN' },
    jp_tv:          { icon: 'si-jp',   sym: 'JP',     label: 'JAPANESE DRAMA',   api: '/api/regional?type=tv&country=JP' },
    top_tv:         { icon: 'si-star', sym: '\u2605', label: 'TOP RATED TV',     api: '/api/tv/top_rated' },
    airing:         { icon: 'si-play', sym: '\u25B6', label: 'ON AIR TODAY',     api: '/api/tv/airing' },
    anime_pop:      { icon: 'si-anime',sym: '\u25C6', label: 'POPULAR ANIME',    api: '/api/anime/popular' },
    anime_top:      { icon: 'si-star', sym: '\u2605', label: 'TOP RATED ANIME',  api: '/api/anime/top_rated' },
    anime_airing:   { icon: 'si-play', sym: '\u25B6', label: 'AIRING ANIME',     api: '/api/anime/airing' },
    anime_upcoming: { icon: 'si-cal',  sym: '\u25C8', label: 'UPCOMING ANIME',   api: '/api/anime/upcoming' },
    anime_movie:    { icon: 'si-anime',sym: '\u25C6', label: 'ANIME MOVIES',     api: '/api/anime/movies' },
  };

  // ===== INIT =====
  async function init() {
    try {
      await loadContent();
      setupNav();
      setupSearch();
      setupScrollObserver();
      setupModal();
    } finally {
      setTimeout(function() { document.getElementById('loadingScreen').classList.add('hidden'); }, 300);
    }
  }

  async function loadContent() {
    var main = document.getElementById('mainContent');
    main.textContent = '';
    loadHero();
    var secs = getActiveSections();
    secs.forEach(function(id) {
      var cfg = SECTION_CFG[id];
      var secEl = createSectionEl(id, cfg);
      main.appendChild(secEl);
      loadSection(cfg.api, secEl, cfg.wide);
    });
  }

  function getActiveSections() {
    if (currentType === 'movie') return ['trending_movie', 'upcoming', 'cn_movie', 'top_movie', 'now_playing'];
    if (currentType === 'tv') return ['trending_tv', 'cn_tv', 'jp_tv', 'top_tv', 'airing'];
    if (currentType === 'anime') return ['anime_pop', 'anime_top', 'anime_airing', 'anime_upcoming', 'anime_movie'];
    // all
    return ['trending_movie', 'upcoming', 'trending_tv', 'anime_pop', 'cn_movie', 'cn_tv', 'jp_tv', 'top_movie', 'anime_top'];
  }

  // ===== HERO =====
  async function loadHero() {
    try {
      var endpoint = '/api/trending/all';
      if (currentType === 'movie') endpoint = '/api/trending/movie';
      else if (currentType === 'tv') endpoint = '/api/trending/tv';
      else if (currentType === 'anime') endpoint = '/api/anime/popular';
      heroSlides = (await api(endpoint)).slice(0, 6);
      renderHero();
    } catch(e) { console.error('Hero error:', e); }
  }

  function renderHero() {
    var hero = document.getElementById('hero');
    var dots = document.getElementById('heroDots');
    hero.querySelectorAll('.hero-slide').forEach(function(s) { s.remove(); });
    dots.textContent = '';

    heroSlides.forEach(function(item, i) {
      var mtype = item.media_type || 'movie';
      var title = esc(item.title || item.title_en || '');
      var slide = el('div', { className: 'hero-slide' + (i === 0 ? ' active' : '') });

      var imgUrl = item.poster || '';
      if (imgUrl) slide.appendChild(el('img', { className: 'hero-backdrop', src: imgUrl, alt: title, loading: i === 0 ? 'eager' : 'lazy' }));
      slide.appendChild(el('div', { className: 'hero-overlay' }));
      slide.appendChild(el('div', { className: 'hero-side-fade' }));

      var content = el('div', { className: 'hero-content' });
      var badgeMap = { movie: 'hero-badge-movie', tv: 'hero-badge-tv', anime: 'hero-badge-anime' };
      var badgeLbl = { movie: 'MOVIE', tv: 'TV SHOW', anime: 'ANIME' };
      content.appendChild(el('span', { className: 'hero-badge ' + (badgeMap[mtype] || 'hero-badge-movie') }, badgeLbl[mtype] || 'MOVIE'));
      content.appendChild(el('h1', { className: 'hero-title' }, title));

      var meta = el('div', { className: 'hero-meta' });
      if (item.rating > 0) { meta.appendChild(el('span', { className: 'hero-rating' }, '\u2605 ' + item.rating)); meta.appendChild(el('span', { className: 'dot' })); }
      if (item.year) meta.appendChild(el('span', null, item.year));
      if (item.genres && item.genres.length) { meta.appendChild(el('span', { className: 'dot' })); meta.appendChild(el('span', null, item.genres.slice(0, 3).join(' / '))); }
      content.appendChild(meta);

      if (item.overview) content.appendChild(el('p', { className: 'hero-desc' }, esc(item.overview)));

      var actions = el('div', { className: 'hero-actions' });
      actions.appendChild(el('button', {
        className: 'btn-detail',
        onClick: (function(it) { return function() { openDetail(it); }; })(item)
      }, 'View Details'));
      content.appendChild(actions);
      slide.appendChild(content);
      hero.insertBefore(slide, dots);

      dots.appendChild(el('button', {
        className: 'hero-dot' + (i === 0 ? ' active' : ''),
        onClick: (function(idx) { return function() { goHero(idx); }; })(i)
      }));
    });

    clearInterval(heroTimer);
    if (heroSlides.length > 1) heroTimer = setInterval(function() { goHero((heroIndex + 1) % heroSlides.length); }, 7000);
  }

  function goHero(i) {
    heroIndex = i;
    document.querySelectorAll('.hero-slide').forEach(function(s, idx) { s.classList.toggle('active', idx === i); });
    document.querySelectorAll('.hero-dot').forEach(function(d, idx) { d.classList.toggle('active', idx === i); });
  }

  // ===== SECTIONS =====
  function createSectionEl(id, cfg) {
    var sec = el('section', { className: 'section', id: 'section-' + id });
    var header = el('div', { className: 'section-header' });
    header.appendChild(el('div', { className: 'section-icon ' + cfg.icon }, cfg.sym));
    header.appendChild(el('h2', { className: 'section-title' }, cfg.label));
    sec.appendChild(header);
    var carousel = el('div', { className: 'carousel' });
    for (var k = 0; k < 8; k++) {
      var ph = el('div', { className: 'card' });
      ph.appendChild(el('div', { className: 'card-poster skeleton', style: 'aspect-ratio:2/3' }));
      carousel.appendChild(ph);
    }
    sec.appendChild(carousel);
    return sec;
  }

  async function loadSection(endpoint, secEl, wide) {
    try {
      var data = await api(endpoint);
      var carousel = secEl.querySelector('.carousel');
      carousel.textContent = '';
      data.forEach(function(item) { carousel.appendChild(createCard(item, wide)); });
      setupDragScroll(carousel);
    } catch(e) { console.error('Section error:', e); }
  }

  function createCard(item, wide) {
    var mtype = item.media_type || 'movie';
    var title = esc(item.title || item.title_en || '');
    var poster = item.poster || noPosterSVG();

    var card = el('div', {
      className: 'card' + (wide ? ' card-wide' : ''),
      onClick: (function(it) { return function() { openDetail(it); }; })(item)
    });

    var posterDiv = el('div', { className: 'card-poster' });
    posterDiv.appendChild(el('img', { src: poster, alt: title, loading: 'lazy' }));
    if (item.rating > 0) posterDiv.appendChild(el('span', { className: 'card-rating' }, '\u2605 ' + item.rating));

    var badgeClass = { movie: 'badge-movie', tv: 'badge-tv', anime: 'badge-anime' };
    var badgeLabel = { movie: 'MOVIE', tv: 'TV', anime: 'ANIME' };
    posterDiv.appendChild(el('span', { className: 'card-type-badge ' + (badgeClass[mtype] || 'badge-movie') }, badgeLabel[mtype] || 'MOVIE'));

    card.appendChild(posterDiv);
    var info = el('div', { className: 'card-info' });
    info.appendChild(el('div', { className: 'card-title' }, title));
    info.appendChild(el('div', { className: 'card-sub' }, item.year || ''));
    card.appendChild(info);
    return card;
  }

  // ===== DETAIL MODAL =====
  function openDetail(item) {
    var overlay = document.getElementById('modalOverlay');
    var body = document.getElementById('modalBody');
    var backdrop = document.getElementById('modalBackdrop');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    body.textContent = '';
    body.appendChild(el('div', { className: 'spinner' }));
    backdrop.src = item.poster || '';

    var mtype = item.media_type || 'movie';
    var detailUrl = '/api/detail/' + mtype + '/' + item.id;

    api(detailUrl).then(function(d) {
      if (d.backdrop) backdrop.src = d.backdrop;
      else if (d.poster) backdrop.src = d.poster;
      body.textContent = '';

      var title = esc(d.title || d.title_en || item.title || '');
      body.appendChild(el('h2', { className: 'modal-title' }, title));

      var meta = el('div', { className: 'modal-meta' });
      if (d.rating > 0) { meta.appendChild(el('span', { className: 'rating' }, '\u2605 ' + d.rating)); meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); }
      if (d.year) meta.appendChild(el('span', null, d.year));
      if (d.runtime) { meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); meta.appendChild(el('span', null, d.runtime)); }
      if (d.status) { meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); meta.appendChild(el('span', null, d.status)); }
      if (d.language) { meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); meta.appendChild(el('span', null, d.language)); }
      if (d.episodes) { meta.appendChild(el('span', { className: 'sep' }, ' \u00B7 ')); meta.appendChild(el('span', null, d.episodes + ' eps')); }
      body.appendChild(meta);

      if (d.genres && d.genres.length) {
        var gd = el('div', { className: 'modal-genres' });
        d.genres.forEach(function(g) { gd.appendChild(el('span', { className: 'genre-tag' }, g)); });
        body.appendChild(gd);
      }

      body.appendChild(el('p', { className: 'modal-overview' }, esc(d.overview) || 'No overview available'));

      if (d.cast && d.cast.length) {
        body.appendChild(el('h3', { className: 'modal-section-title' }, 'CAST'));
        var cd = el('div', { className: 'modal-cast' });
        d.cast.forEach(function(c) {
          var cc = el('div', { className: 'cast-card' });
          cc.appendChild(el('img', { className: 'cast-avatar', src: c.avatar || noPosterSVG(), alt: esc(c.name), loading: 'lazy' }));
          cc.appendChild(el('div', { className: 'cast-name' }, esc(c.name)));
          cc.appendChild(el('div', { className: 'cast-role' }, esc(c.character || '')));
          cd.appendChild(cc);
        });
        body.appendChild(cd);
      }
    }).catch(function(e) {
      body.textContent = '';
      // Show basic info from the item itself
      body.appendChild(el('h2', { className: 'modal-title' }, esc(item.title || '')));
      if (item.overview) body.appendChild(el('p', { className: 'modal-overview' }, esc(item.overview)));
      else body.appendChild(el('p', { style: 'color:var(--text-secondary);padding:20px 0' }, 'Detail loading failed.'));
      console.error(e);
    });
  }

  function setupModal() {
    document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === e.currentTarget) closeModal(); });
    document.getElementById('modalClose').addEventListener('click', closeModal);
  }
  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); document.body.style.overflow = ''; }

  // ===== NAV =====
  function setupNav() {
    window.addEventListener('scroll', function() {
      document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50);
    }, { passive: true });
    document.getElementById('navBrand').addEventListener('click', function() { window.scrollTo({ top: 0 }); });
    document.querySelectorAll('.nav-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        currentType = tab.dataset.type;
        loadContent();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  // ===== SEARCH =====
  function setupSearch() {
    var overlay = document.getElementById('searchOverlay');
    var input = document.getElementById('searchInput');
    var results = document.getElementById('searchResults');
    results.textContent = '';
    results.appendChild(el('div', { className: 'search-empty' }, 'Search for movies, TV shows, and anime'));
    document.getElementById('searchBtn').addEventListener('click', function() { overlay.classList.add('open'); input.focus(); });
    document.getElementById('searchClose').addEventListener('click', function() { overlay.classList.remove('open'); input.value = ''; });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && overlay.classList.contains('open')) { overlay.classList.remove('open'); input.value = ''; }
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); overlay.classList.add('open'); input.focus(); }
    });
    input.addEventListener('input', function() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(function() { doSearch(input.value.trim()); }, 400);
    });
  }

  async function doSearch(q) {
    var c = document.getElementById('searchResults');
    if (!q) { c.textContent = ''; c.appendChild(el('div', { className: 'search-empty' }, 'Search for movies, TV shows, and anime')); return; }
    c.textContent = ''; c.appendChild(el('div', { className: 'spinner' }));
    try {
      var data = await api('/api/search?q=' + encodeURIComponent(q));
      c.textContent = '';
      if (!data.length) { c.appendChild(el('div', { className: 'search-empty' }, 'No results for "' + esc(q) + '"')); return; }
      var grid = el('div', { className: 'search-results-grid' });
      data.forEach(function(item) { grid.appendChild(createCard(item)); });
      c.appendChild(grid);
    } catch(e) { c.textContent = ''; c.appendChild(el('div', { className: 'search-empty' }, 'Search error.')); }
  }

  // ===== DRAG =====
  function setupDragScroll(el) {
    var isDown = false, sx = 0, sl = 0;
    el.addEventListener('mousedown', function(e) { isDown = true; sx = e.pageX - el.offsetLeft; sl = el.scrollLeft; });
    el.addEventListener('mouseleave', function() { isDown = false; });
    el.addEventListener('mouseup', function() { isDown = false; });
    el.addEventListener('mousemove', function(e) { if (!isDown) return; e.preventDefault(); el.scrollLeft = sl - (e.pageX - el.offsetLeft - sx) * 1.5; });
  }

  // ===== SCROLL =====
  function setupScrollObserver() {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    new MutationObserver(function() {
      document.querySelectorAll('.section:not(.visible)').forEach(function(s) { obs.observe(s); });
    }).observe(document.getElementById('mainContent'), { childList: true });
  }

  // GO
  init();
})();
</script>
</body>
